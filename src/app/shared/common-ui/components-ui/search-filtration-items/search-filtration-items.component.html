<div class="search-wrapper">
  <mat-form-field class="search-form-field" appearance="outline">
    <mat-label>Поиск...</mat-label>
    <input
      autofocus
      matInput
      placeholder="Введите название"
      type="text"
      [(ngModel)]="filterName"
      (keyup.enter)="onFilteredItems()"
      />
    @if (filterName) {
      <button
        matSuffix
        mat-icon-button
        aria-label="clear"
        (click)="clearFilterName()"
        >
        <mat-icon>close</mat-icon>
      </button>
    }
    @if (!filterName) {
      <button
        mat-icon-button
        matIconPrefix
        matTooltip="search"
        matTooltipPosition="before"
        class="mat-small"
        >
        <mat-icon>search</mat-icon>
      </button>
    }
  </mat-form-field>

  <button
    class="search-button"
    mat-raised-button
    matTooltip="search"
    matTooltipPosition="before"
    color="primary"
    (click)="onFilteredItems()"
    >
    <mat-icon>search</mat-icon>
    <span>Поиск</span>
  </button>
</div>

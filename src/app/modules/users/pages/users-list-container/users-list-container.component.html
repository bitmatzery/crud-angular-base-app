<p-confirmDialog></p-confirmDialog>
@if (filteredUsers$ | async; as users) {
  <users-list-ui
    [users]       = "users"
    (deleteUser)  = "OnDeleteUser($event)"
    (editUser)    = "OnEditUser($event)"
    (filterUsers) = "OnFilteredUsersAndNavigate($event)"
    >
  </users-list-ui>
} @else {
  <div>Loading...</div>
}

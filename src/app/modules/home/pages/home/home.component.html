<div class="home-container">
  <div class="home__title">
    <h1>AlwaysMarket is always your go-to place for shopping!</h1>
  </div>
  <!-- Сообщения об ошибках инициализации -->
  @if (initializationMessage) {
    <div
      class="initialization-message"
      [class.error]="initializationError"
      [class.recovering]="isRecovering">
      <span>{{ initializationMessage }}</span>
      <div class="action-buttons">
        @if (initializationError && !isRecovering) {
          <button
            class="retry-btn"
            (click)="retryInitialization()">
            Повторить
          </button>
        }
        @if (initializationError && !isRecovering) {
          <button
            class="recovery-btn"
            (click)="forceDataRecovery()">
            Восстановить данные
          </button>
        }
        @if (isRecovering) {
          <div class="recovery-progress">
            <div class="spinner"></div>
            <span>Восстановление...</span>
          </div>
        }
      </div>
    </div>
  }

  <!-- Секция категорий -->
  <section class="categories-section">
    <product-list-container [displayType]="displayType.CATEGORIES">
    </product-list-container>
  </section>

  <!-- Секция продуктов -->
  <section class="products-section">
    <product-list-container [displayType]="displayType.PRODUCTS">
    </product-list-container>
  </section>

</div>
